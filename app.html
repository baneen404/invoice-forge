<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InvoiceForge – Create your invoice</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Geist', system-ui, sans-serif; background: #F9FAFB; }
        .font-mono { font-family: 'Geist Mono', monospace; }
        .tab-active { border-bottom: 2px solid #0066FF; color: #0066FF; }
        .tab-btn { cursor: pointer; }
    </style>
</head>
<body class="bg-gray-50">

<!-- Same floating nav, but "New Invoice" becomes active -->
<header class="fixed top-4 left-1/2 -translate-x-1/2 z-50">
    <nav class="bg-white/80 backdrop-blur-lg border border-gray-200 rounded-full px-2 py-2 flex items-center gap-1 shadow-sm">
        <a href="index.html" class="px-4 font-semibold text-gray-900">InvoiceForge</a>
        <a href="#" class="px-3 py-1.5 text-sm text-gray-500 hover:text-gray-900 rounded-full">Templates</a>
        <a href="#" class="px-3 py-1.5 text-sm text-gray-500 hover:text-gray-900 rounded-full">Guide</a>
        <a href="#" class="px-3 py-1.5 text-sm text-gray-500 hover:text-gray-900 rounded-full">GitHub</a>
        <span class="bg-[#0066FF] text-white px-4 py-1.5 rounded-full text-sm font-medium ml-2">New Invoice</span>
    </nav>
</header>

<main class="pt-24 pb-12 px-4 max-w-7xl mx-auto">
    <div class="grid lg:grid-cols-2 gap-8">
        <!-- Left: Form -->
        <div class="bg-white rounded-xl border border-gray-200 shadow-sm p-6">
            <div class="flex border-b border-gray-200 mb-6">
                <button class="tab-btn px-4 py-2 text-sm font-medium tab-active" data-tab="from">From</button>
                <button class="tab-btn px-4 py-2 text-sm font-medium text-gray-500" data-tab="to">To</button>
                <button class="tab-btn px-4 py-2 text-sm font-medium text-gray-500" data-tab="items">Items</button>
                <button class="tab-btn px-4 py-2 text-sm font-medium text-gray-500" data-tab="settings">Settings</button>
                <button class="tab-btn px-4 py-2 text-sm font-medium text-gray-500" data-tab="extras">Extras</button>
            </div>

            <!-- From Tab -->
            <div id="tab-from" class="tab-pane space-y-4">
                <div><label class="block text-sm font-medium text-gray-700">Your Name</label><input type="text" class="mt-1 w-full border border-gray-300 rounded-lg px-3 py-2 text-sm"></div>
                <div><label class="block text-sm font-medium text-gray-700">Email</label><input type="email" class="mt-1 w-full border border-gray-300 rounded-lg px-3 py-2 text-sm"></div>
                <div><label class="block text-sm font-medium text-gray-700">Phone</label><input type="text" class="mt-1 w-full border border-gray-300 rounded-lg px-3 py-2 text-sm"></div>
                <div><label class="block text-sm font-medium text-gray-700">Address</label><textarea rows="2" class="mt-1 w-full border border-gray-300 rounded-lg px-3 py-2 text-sm"></textarea></div>
                <div><label class="block text-sm font-medium text-gray-700">Website</label><input type="text" class="mt-1 w-full border border-gray-300 rounded-lg px-3 py-2 text-sm"></div>
                <div><label class="block text-sm font-medium text-gray-700">Tax ID (optional)</label><input type="text" class="mt-1 w-full border border-gray-300 rounded-lg px-3 py-2 text-sm"></div>
                <div><label class="block text-sm font-medium text-gray-700">Logo</label><input type="file" accept="image/*"></div>
            </div>

            <!-- To Tab (similar) -->
            <div id="tab-to" class="tab-pane hidden space-y-4">
                <div><label class="block text-sm font-medium text-gray-700">Client Name</label><input type="text" class="mt-1 w-full border border-gray-300 rounded-lg px-3 py-2 text-sm"></div>
                <div><label class="block text-sm font-medium text-gray-700">Client Email</label><input type="email" class="mt-1 w-full border border-gray-300 rounded-lg px-3 py-2 text-sm"></div>
                <div><label class="block text-sm font-medium text-gray-700">Client Phone</label><input type="text" class="mt-1 w-full border border-gray-300 rounded-lg px-3 py-2 text-sm"></div>
                <div><label class="block text-sm font-medium text-gray-700">Client Address</label><textarea rows="2" class="mt-1 w-full border border-gray-300 rounded-lg px-3 py-2 text-sm"></textarea></div>
                <div><label class="block text-sm font-medium text-gray-700">Client Tax ID / NTN</label><input type="text" class="mt-1 w-full border border-gray-300 rounded-lg px-3 py-2 text-sm"></div>
            </div>

            <!-- Items Tab (placeholder) -->
            <div id="tab-items" class="tab-pane hidden">
    <div class="overflow-x-auto">
        <table class="w-full text-sm">
            <thead class="border-b border-gray-200">
                <tr class="text-left text-gray-500">
                    <th class="pb-2">Description</th>
                    <th class="pb-2 w-20 text-center">Qty</th>
                    <th class="pb-2 w-28 text-right">Rate</th>
                    <th class="pb-2 w-28 text-right">Amount</th>
                    <th class="pb-2 w-8"></th>
                </tr>
            </thead>
            <tbody id="items-tbody"></tbody>
        </table>
    </div>
    <button id="addItemBtn" class="mt-3 text-sm text-[#0066FF] hover:text-[#0052CC] flex items-center gap-1">
        + Add line item
    </button>
    <div class="mt-6 border-t border-gray-200 pt-4 space-y-2 text-right">
        <div class="flex justify-end gap-8 text-sm">
            <span>Subtotal</span>
            <span id="subtotal" class="font-mono">$0.00</span>
        </div>
        <div class="flex justify-end gap-8 text-sm">
            <span>Tax (<span id="taxRateDisplay">17</span>%)</span>
            <span id="taxAmount" class="font-mono">$0.00</span>
        </div>
        <div class="flex justify-end gap-8 text-base font-semibold">
            <span>Total</span>
            <span id="grandTotal" class="font-mono text-[#0066FF]">$0.00</span>
        </div>
    </div>
</div>

            <!-- Settings Tab -->
            <div id="tab-settings" class="tab-pane hidden space-y-4">
                <div><label class="block text-sm font-medium text-gray-700">Invoice Number</label><input type="text" value="INV-001" class="mt-1 w-full border border-gray-300 rounded-lg px-3 py-2 text-sm"></div>
                <div><label class="block text-sm font-medium text-gray-700">Issue Date</label><input type="date" class="mt-1 w-full border border-gray-300 rounded-lg px-3 py-2 text-sm"></div>
                <div><label class="block text-sm font-medium text-gray-700">Due Terms</label><select class="mt-1 w-full border border-gray-300 rounded-lg px-3 py-2 text-sm"><option>Net 7</option><option selected>Net 14</option><option>Net 30</option><option>Due on receipt</option></select></div>
                <div><label class="block text-sm font-medium text-gray-700">Currency</label><select class="mt-1 w-full border border-gray-300 rounded-lg px-3 py-2 text-sm"><option>USD ($)</option><option>PKR (Rs)</option><option>EUR (€)</option></select></div>
                <div><label class="block text-sm font-medium text-gray-700">Tax Rate (%)</label><input type="number" value="17" class="mt-1 w-full border border-gray-300 rounded-lg px-3 py-2 text-sm"></div>
                <div><label class="block text-sm font-medium text-gray-700">Discount (%)</label><input type="number" value="0" class="mt-1 w-full border border-gray-300 rounded-lg px-3 py-2 text-sm"></div>
                <div><label class="block text-sm font-medium text-gray-700">PO Number (optional)</label><input type="text" class="mt-1 w-full border border-gray-300 rounded-lg px-3 py-2 text-sm"></div>
                <div><label class="block text-sm font-medium text-gray-700">Payment Info</label><textarea rows="3" placeholder="Bank: HBL\nIBAN: PK36HABB..." class="mt-1 w-full border border-gray-300 rounded-lg px-3 py-2 text-sm"></textarea></div>
                <div><label class="block text-sm font-medium text-gray-700">Status</label><select class="mt-1 w-full border border-gray-300 rounded-lg px-3 py-2 text-sm"><option>Draft</option><option>Sent</option><option>Paid</option><option>Overdue</option></select></div>
                <div><label class="block text-sm font-medium text-gray-700">Notes / Terms</label><textarea rows="2" class="mt-1 w-full border border-gray-300 rounded-lg px-3 py-2 text-sm"></textarea></div>
            </div>

            <!-- Extras Tab (placeholder) -->
            <div id="tab-extras" class="tab-pane hidden">
                <p class="text-gray-500 text-center py-8">Late fee, signature, custom fields will be added later.</p>
            </div>
        </div>

        <!-- Right: Preview -->
        <div class="bg-white rounded-xl border border-gray-200 shadow-sm p-6 sticky top-24">
            <h2 class="font-semibold text-gray-900 mb-4">Live Preview</h2>
            <div class="border border-gray-200 rounded-lg p-4 bg-gray-50 min-h-[400px]">
                <p class="text-gray-500 text-center text-sm">Your invoice preview will appear here as you fill the form.</p>
            </div>
            <div class="mt-4 flex gap-3">
                <button class="flex-1 bg-[#0066FF] text-white py-2 rounded-lg font-medium hover:bg-[#0052CC] transition">Download PDF</button>
                <button class="flex-1 border border-gray-300 text-gray-700 py-2 rounded-lg font-medium hover:bg-gray-50 transition">Save .forge File</button>
            </div>
        </div>
    </div>
</main>

<script>
// Tab switching
const tabs = document.querySelectorAll('.tab-btn');
const panes = document.querySelectorAll('.tab-pane');
tabs.forEach(btn => {
    btn.addEventListener('click', () => {
        const tabId = btn.getAttribute('data-tab');
        tabs.forEach(b => {
            b.classList.remove('tab-active');
            b.classList.add('text-gray-500');
        });
        btn.classList.add('tab-active');
        btn.classList.remove('text-gray-500');
        panes.forEach(pane => pane.classList.add('hidden'));
        document.getElementById(`tab-${tabId}`).classList.remove('hidden');
    });
});

// ---------- Items Table Logic ----------
let items = [];

const savedInvoice = localStorage.getItem('invoiceforge_app');
if (savedInvoice) {
    const data = JSON.parse(savedInvoice);
    items = data.items || [{ id: Date.now(), description: '', qty: 1, rate: 0 }];
} else {
    items = [{ id: Date.now(), description: '', qty: 1, rate: 0 }];
}

function saveFullInvoice() {
    const invoice = {
        items,
        from: {
            name: document.getElementById('fromName')?.value || '',
            email: document.getElementById('fromEmail')?.value || '',
            phone: document.getElementById('fromPhone')?.value || '',
            address: document.getElementById('fromAddress')?.value || '',
            website: document.getElementById('fromWebsite')?.value || '',
            taxId: document.getElementById('fromTaxId')?.value || '',
        },
        to: {
            name: document.getElementById('toName')?.value || '',
            email: document.getElementById('toEmail')?.value || '',
            phone: document.getElementById('toPhone')?.value || '',
            address: document.getElementById('toAddress')?.value || '',
            taxId: document.getElementById('toTaxId')?.value || '',
        },
        settings: {
            invoiceNumber: document.getElementById('invNumber')?.value || 'INV-001',
            issueDate: document.getElementById('issueDate')?.value || new Date().toISOString().slice(0,10),
            dueTerms: document.getElementById('dueTerms')?.value || '14',
            currency: document.getElementById('currency')?.value || 'USD',
            taxRate: parseFloat(document.getElementById('taxRate')?.value) || 17,
            discount: parseFloat(document.getElementById('discount')?.value) || 0,
            poNumber: document.getElementById('poNumber')?.value || '',
            paymentInfo: document.getElementById('paymentInfo')?.value || '',
            status: document.getElementById('status')?.value || 'draft',
            notes: document.getElementById('notes')?.value || '',
        }
    };
    localStorage.setItem('invoiceforge_app', JSON.stringify(invoice));
}

function renderItemsTable() {
    const tbody = document.getElementById('items-tbody');
    if (!tbody) return;
    tbody.innerHTML = '';
    items.forEach((item, idx) => {
        const row = tbody.insertRow();
        row.className = 'border-b border-gray-100';
        const descCell = row.insertCell(0);
        descCell.className = 'py-2';
        const descInput = document.createElement('input');
        descInput.type = 'text';
        descInput.value = item.description;
        descInput.placeholder = 'Web design, consulting...';
        descInput.className = 'w-full bg-transparent border-none focus:ring-0 p-0 text-sm';
        descInput.addEventListener('input', (e) => {
            items[idx].description = e.target.value;
            saveFullInvoice();
            calculateTotals();
        });
        descCell.appendChild(descInput);

        const qtyCell = row.insertCell(1);
        qtyCell.className = 'text-center py-2';
        const qtyInput = document.createElement('input');
        qtyInput.type = 'number';
        qtyInput.value = item.qty;
        qtyInput.className = 'w-20 text-center border rounded px-1 py-0.5 text-sm';
        qtyInput.step = '0.01';
        qtyInput.min = '0';
        qtyInput.addEventListener('input', (e) => {
            items[idx].qty = parseFloat(e.target.value) || 0;
            saveFullInvoice();
            calculateTotals();
        });
        qtyCell.appendChild(qtyInput);

        const rateCell = row.insertCell(2);
        rateCell.className = 'text-right py-2';
        const rateInput = document.createElement('input');
        rateInput.type = 'number';
        rateInput.value = item.rate;
        rateInput.className = 'w-24 text-right border rounded px-1 py-0.5 text-sm';
        rateInput.step = '0.01';
        rateInput.min = '0';
        rateInput.addEventListener('input', (e) => {
            items[idx].rate = parseFloat(e.target.value) || 0;
            saveFullInvoice();
            calculateTotals();
        });
        const currencySymbol = getCurrencySymbol();
        rateCell.innerHTML = `<span class="mr-1">${currencySymbol}</span>`;
        rateCell.appendChild(rateInput);

        const amountCell = row.insertCell(3);
        amountCell.className = 'text-right font-mono py-2';
        const amount = (item.qty * item.rate);
        amountCell.innerText = `${currencySymbol}${amount.toFixed(2)}`;

        const delCell = row.insertCell(4);
        delCell.className = 'text-center py-2';
        const delBtn = document.createElement('button');
        delBtn.innerHTML = '✕';
        delBtn.className = 'text-red-500 hover:text-red-700 text-xs';
        delBtn.addEventListener('click', () => {
            if (items.length === 1) return;
            items.splice(idx, 1);
            renderItemsTable();
            saveFullInvoice();
            calculateTotals();
        });
        delCell.appendChild(delBtn);
    });
    calculateTotals();
}

function getCurrencySymbol() {
    const currencySelect = document.getElementById('currency');
    const map = { USD: '$', PKR: 'Rs', EUR: '€' };
    return map[currencySelect?.value] || '$';
}

function calculateTotals() {
    const subtotal = items.reduce((sum, i) => sum + (i.qty || 0) * (i.rate || 0), 0);
    const taxRate = parseFloat(document.getElementById('taxRate')?.value) || 17;
    const taxAmount = subtotal * (taxRate / 100);
    const total = subtotal + taxAmount;
    document.getElementById('subtotal').innerText = `${getCurrencySymbol()}${subtotal.toFixed(2)}`;
    document.getElementById('taxAmount').innerText = `${getCurrencySymbol()}${taxAmount.toFixed(2)}`;
    document.getElementById('grandTotal').innerText = `${getCurrencySymbol()}${total.toFixed(2)}`;
    document.getElementById('taxRateDisplay').innerText = taxRate;
}

document.getElementById('addItemBtn')?.addEventListener('click', () => {
    items.push({ id: Date.now(), description: '', qty: 1, rate: 0 });
    renderItemsTable();
    saveFullInvoice();
});

document.getElementById('currency')?.addEventListener('change', () => {
    renderItemsTable();
    saveFullInvoice();
});

document.getElementById('taxRate')?.addEventListener('input', () => {
    calculateTotals();
    saveFullInvoice();
});

function attachFieldListeners() {
    const fields = ['#fromName', '#fromEmail', '#fromPhone', '#fromAddress', '#fromWebsite', '#fromTaxId',
                    '#toName', '#toEmail', '#toPhone', '#toAddress', '#toTaxId',
                    '#invNumber', '#issueDate', '#dueTerms', '#currency', '#taxRate', '#discount',
                    '#poNumber', '#paymentInfo', '#status', '#notes'];
    fields.forEach(sel => {
        const el = document.querySelector(sel);
        if (el) el.addEventListener('input', () => saveFullInvoice());
    });
}

function loadSavedData() {
    const saved = localStorage.getItem('invoiceforge_app');
    if (!saved) return;
    const data = JSON.parse(saved);
    if (data.from) {
        document.getElementById('fromName').value = data.from.name || '';
        document.getElementById('fromEmail').value = data.from.email || '';
        document.getElementById('fromPhone').value = data.from.phone || '';
        document.getElementById('fromAddress').value = data.from.address || '';
        document.getElementById('fromWebsite').value = data.from.website || '';
        document.getElementById('fromTaxId').value = data.from.taxId || '';
    }
    if (data.to) {
        document.getElementById('toName').value = data.to.name || '';
        document.getElementById('toEmail').value = data.to.email || '';
        document.getElementById('toPhone').value = data.to.phone || '';
        document.getElementById('toAddress').value = data.to.address || '';
        document.getElementById('toTaxId').value = data.to.taxId || '';
    }
    if (data.settings) {
        document.getElementById('invNumber').value = data.settings.invoiceNumber || 'INV-001';
        document.getElementById('issueDate').value = data.settings.issueDate || new Date().toISOString().slice(0,10);
        document.getElementById('dueTerms').value = data.settings.dueTerms || '14';
        document.getElementById('currency').value = data.settings.currency || 'USD';
        document.getElementById('taxRate').value = data.settings.taxRate || 17;
        document.getElementById('discount').value = data.settings.discount || 0;
        document.getElementById('poNumber').value = data.settings.poNumber || '';
        document.getElementById('paymentInfo').value = data.settings.paymentInfo || '';
        document.getElementById('status').value = data.settings.status || 'draft';
        document.getElementById('notes').value = data.settings.notes || '';
    }
    if (data.items) {
        items = data.items;
        renderItemsTable();
    }
}

loadSavedData();
renderItemsTable();
attachFieldListeners();
    });
    });
</script>
</body>
</html>
