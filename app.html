<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InvoiceForge – Create Invoice</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #F9FAFB; }
        .tab-active { border-bottom: 2px solid #0066FF; color: #0066FF; }
    </style>
</head>
<body class="bg-gray-50">

<!-- Simple header -->
<div class="bg-white border-b border-gray-200 sticky top-0 z-10">
    <div class="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center">
        <a href="index.html" class="font-bold text-xl text-[#0066FF]">InvoiceForge</a>
        <div class="flex gap-4 text-sm">
            <a href="#" class="text-gray-600">Templates</a>
            <a href="#" class="text-gray-600">Guide</a>
            <a href="#" class="text-gray-600">GitHub</a>
        </div>
    </div>
</div>

<main class="max-w-7xl mx-auto px-4 py-8">
    <!-- TEMPLATE SWITCHER - VISIBLE AT TOP -->
    <div class="mb-6 bg-white p-4 rounded-xl border border-gray-200 shadow-sm">
        <label class="block text-sm font-medium text-gray-700 mb-2">Choose Template Style</label>
        <div class="flex gap-3">
            <button id="templateLetter" class="template-btn px-4 py-2 text-sm border rounded-lg hover:bg-gray-50 transition">Letter</button>
            <button id="templateLedger" class="template-btn px-4 py-2 text-sm border rounded-lg hover:bg-gray-50 transition">Ledger</button>
            <button id="templateInvoice" class="template-btn px-4 py-2 text-sm border rounded-lg hover:bg-gray-50 transition">Invoice</button>
        </div>
    </div>

    <div class="grid lg:grid-cols-2 gap-8">
        <!-- LEFT: FORM PANEL -->
        <div class="bg-white rounded-xl border border-gray-200 shadow-sm p-6">
            <!-- Tabs -->
            <div class="flex border-b border-gray-200 mb-6">
                <button class="tab-btn px-4 py-2 text-sm font-medium tab-active" data-tab="from">From</button>
                <button class="tab-btn px-4 py-2 text-sm font-medium text-gray-500" data-tab="to">To</button>
                <button class="tab-btn px-4 py-2 text-sm font-medium text-gray-500" data-tab="items">Items</button>
                <button class="tab-btn px-4 py-2 text-sm font-medium text-gray-500" data-tab="settings">Settings</button>
            </div>

            <!-- From Tab -->
            <div id="tab-from" class="tab-pane space-y-4">
                <div><label class="block text-sm font-medium text-gray-700">Your Name</label><input type="text" id="fromName" class="mt-1 w-full border border-gray-300 rounded-lg px-3 py-2 text-sm"></div>
                <div><label class="block text-sm font-medium text-gray-700">Email</label><input type="email" id="fromEmail" class="mt-1 w-full border border-gray-300 rounded-lg px-3 py-2 text-sm"></div>
                <div><label class="block text-sm font-medium text-gray-700">Phone</label><input type="text" id="fromPhone" class="mt-1 w-full border border-gray-300 rounded-lg px-3 py-2 text-sm"></div>
                <div><label class="block text-sm font-medium text-gray-700">Address</label><textarea id="fromAddress" rows="2" class="mt-1 w-full border border-gray-300 rounded-lg px-3 py-2 text-sm"></textarea></div>
                <div><label class="block text-sm font-medium text-gray-700">Website</label><input type="text" id="fromWebsite" class="mt-1 w-full border border-gray-300 rounded-lg px-3 py-2 text-sm"></div>
                <div><label class="block text-sm font-medium text-gray-700">Tax ID</label><input type="text" id="fromTaxId" class="mt-1 w-full border border-gray-300 rounded-lg px-3 py-2 text-sm"></div>
            </div>

            <!-- To Tab -->
            <div id="tab-to" class="tab-pane hidden space-y-4">
                <div><label class="block text-sm font-medium text-gray-700">Client Name</label><input type="text" id="toName" class="mt-1 w-full border border-gray-300 rounded-lg px-3 py-2 text-sm"></div>
                <div><label class="block text-sm font-medium text-gray-700">Client Email</label><input type="email" id="toEmail" class="mt-1 w-full border border-gray-300 rounded-lg px-3 py-2 text-sm"></div>
                <div><label class="block text-sm font-medium text-gray-700">Client Phone</label><input type="text" id="toPhone" class="mt-1 w-full border border-gray-300 rounded-lg px-3 py-2 text-sm"></div>
                <div><label class="block text-sm font-medium text-gray-700">Client Address</label><textarea id="toAddress" rows="2" class="mt-1 w-full border border-gray-300 rounded-lg px-3 py-2 text-sm"></textarea></div>
                <div><label class="block text-sm font-medium text-gray-700">Client Tax ID</label><input type="text" id="toTaxId" class="mt-1 w-full border border-gray-300 rounded-lg px-3 py-2 text-sm"></div>
            </div>

            <!-- Items Tab -->
            <div id="tab-items" class="tab-pane hidden">
                <div class="overflow-x-auto">
                    <table class="w-full text-sm">
                        <thead class="border-b border-gray-200"><tr class="text-left text-gray-500"><th class="pb-2">Description</th><th class="pb-2 w-20 text-center">Qty</th><th class="pb-2 w-28 text-right">Rate</th><th class="pb-2 w-28 text-right">Amount</th><th class="pb-2 w-8"></th></tr></thead>
                        <tbody id="items-tbody"></tbody>
                    </table>
                </div>
                <button id="addItemBtn" class="mt-3 text-sm text-[#0066FF] hover:text-[#0052CC]">+ Add line item</button>
                <div class="mt-6 border-t pt-4 space-y-2 text-right">
                    <div class="flex justify-end gap-8"><span>Subtotal</span><span id="subtotal" class="font-mono">$0.00</span></div>
                    <div class="flex justify-end gap-8"><span>Tax (<span id="taxRateDisplay">17</span>%)</span><span id="taxAmount" class="font-mono">$0.00</span></div>
                    <div class="flex justify-end gap-8 font-semibold"><span>Total</span><span id="grandTotal" class="font-mono text-[#0066FF]">$0.00</span></div>
                </div>
            </div>

            <!-- Settings Tab -->
            <div id="tab-settings" class="tab-pane hidden space-y-4">
                <div><label class="block text-sm font-medium text-gray-700">Invoice Number</label><input type="text" id="invNumber" value="INV-001" class="mt-1 w-full border border-gray-300 rounded-lg px-3 py-2 text-sm"></div>
                <div><label class="block text-sm font-medium text-gray-700">Issue Date</label><input type="date" id="issueDate" class="mt-1 w-full border border-gray-300 rounded-lg px-3 py-2 text-sm"></div>
                <div><label class="block text-sm font-medium text-gray-700">Due Terms</label><select id="dueTerms" class="mt-1 w-full border border-gray-300 rounded-lg px-3 py-2 text-sm"><option>Net 7</option><option selected>Net 14</option><option>Net 30</option><option>Due on receipt</option></select></div>
                <div><label class="block text-sm font-medium text-gray-700">Currency</label><select id="currency" class="mt-1 w-full border border-gray-300 rounded-lg px-3 py-2 text-sm"><option value="USD">USD ($)</option><option value="PKR">PKR (Rs)</option><option value="EUR">EUR (€)</option></select></div>
                <div><label class="block text-sm font-medium text-gray-700">Tax Rate (%)</label><input type="number" id="taxRate" value="17" step="0.1" class="mt-1 w-full border border-gray-300 rounded-lg px-3 py-2 text-sm"></div>
                <div><label class="block text-sm font-medium text-gray-700">Notes</label><textarea id="notes" rows="2" class="mt-1 w-full border border-gray-300 rounded-lg px-3 py-2 text-sm"></textarea></div>
            </div>
        </div>

        <!-- RIGHT: LIVE PREVIEW -->
        <div class="bg-white rounded-xl border border-gray-200 shadow-sm p-6 sticky top-24">
            <div class="flex justify-between items-center mb-4">
                <h2 class="font-semibold text-gray-900">Live Preview</h2>
                <span id="templateBadge" class="text-xs bg-gray-100 px-2 py-1 rounded">Letter</span>
            </div>
            <div id="livePreviewContent" class="border border-gray-200 rounded-lg p-4 bg-gray-50 min-h-[400px] overflow-y-auto">
                <p class="text-gray-500 text-center text-sm">Fill in the form to see preview</p>
            </div>
            <div class="mt-4 flex gap-3">
                <button id="downloadPdfBtn" class="flex-1 bg-[#0066FF] text-white py-2 rounded-lg font-medium hover:bg-[#0052CC] transition">Download PDF</button>
                <button id="exportForgeBtn" class="flex-1 border border-gray-300 text-gray-700 py-2 rounded-lg font-medium hover:bg-gray-50 transition">Save .forge</button>
            </div>
        </div>
    </div>
</main>

<script>
    // ---------- TAB SWITCHING ----------
    const tabs = document.querySelectorAll('.tab-btn');
    const panes = document.querySelectorAll('.tab-pane');
    tabs.forEach(btn => {
        btn.addEventListener('click', () => {
            const tabId = btn.getAttribute('data-tab');
            tabs.forEach(b => { b.classList.remove('tab-active'); b.classList.add('text-gray-500'); });
            btn.classList.add('tab-active'); btn.classList.remove('text-gray-500');
            panes.forEach(pane => pane.classList.add('hidden'));
            document.getElementById(`tab-${tabId}`).classList.remove('hidden');
        });
    });

    // ---------- DATA ----------
    let items = [];

    function getCurrencySymbol() {
        const map = { USD: '$', PKR: 'Rs', EUR: '€' };
        return map[document.getElementById('currency')?.value] || '$';
    }

    function calculateTotals() {
        const subtotal = items.reduce((sum, i) => sum + (i.qty || 0) * (i.rate || 0), 0);
        const taxRate = parseFloat(document.getElementById('taxRate')?.value) || 17;
        const taxAmount = subtotal * taxRate / 100;
        const total = subtotal + taxAmount;
        document.getElementById('subtotal').innerText = `${getCurrencySymbol()}${subtotal.toFixed(2)}`;
        document.getElementById('taxAmount').innerText = `${getCurrencySymbol()}${taxAmount.toFixed(2)}`;
        document.getElementById('grandTotal').innerText = `${getCurrencySymbol()}${total.toFixed(2)}`;
        document.getElementById('taxRateDisplay').innerText = taxRate;
    }

    function renderItemsTable() {
        const tbody = document.getElementById('items-tbody');
        if (!tbody) return;
        tbody.innerHTML = '';
        items.forEach((item, idx) => {
            const row = tbody.insertRow();
            row.className = 'border-b border-gray-100';
            const descCell = row.insertCell(0); descCell.className = 'py-2';
            const descInput = document.createElement('input');
            descInput.type = 'text'; descInput.value = item.description || '';
            descInput.placeholder = 'Web design...';
            descInput.className = 'w-full bg-transparent border-none p-0 text-sm';
            descInput.addEventListener('input', (e) => { items[idx].description = e.target.value; saveFullInvoice(); calculateTotals(); updateLivePreview(); });
            descCell.appendChild(descInput);
            const qtyCell = row.insertCell(1); qtyCell.className = 'text-center py-2';
            const qtyInput = document.createElement('input');
            qtyInput.type = 'number'; qtyInput.value = item.qty; qtyInput.className = 'w-20 text-center border rounded px-1 py-0.5 text-sm';
            qtyInput.step = '0.01'; qtyInput.min = '0';
            qtyInput.addEventListener('input', (e) => { items[idx].qty = parseFloat(e.target.value) || 0; saveFullInvoice(); calculateTotals(); updateLivePreview(); });
            qtyCell.appendChild(qtyInput);
            const rateCell = row.insertCell(2); rateCell.className = 'text-right py-2';
            const rateInput = document.createElement('input');
            rateInput.type = 'number'; rateInput.value = item.rate; rateInput.className = 'w-24 text-right border rounded px-1 py-0.5 text-sm';
            rateInput.step = '0.01'; rateInput.min = '0';
            rateInput.addEventListener('input', (e) => { items[idx].rate = parseFloat(e.target.value) || 0; saveFullInvoice(); calculateTotals(); updateLivePreview(); });
            const symbol = getCurrencySymbol();
            rateCell.innerHTML = `<span class="mr-1">${symbol}</span>`; rateCell.appendChild(rateInput);
            const amountCell = row.insertCell(3); amountCell.className = 'text-right font-mono py-2';
            amountCell.innerText = `${symbol}${((item.qty||0)*(item.rate||0)).toFixed(2)}`;
            const delCell = row.insertCell(4); delCell.className = 'text-center py-2';
            const delBtn = document.createElement('button'); delBtn.innerHTML = '✕'; delBtn.className = 'text-red-500 hover:text-red-700 text-xs';
            delBtn.addEventListener('click', () => { if (items.length === 1) return; items.splice(idx, 1); renderItemsTable(); saveFullInvoice(); calculateTotals(); updateLivePreview(); });
            delCell.appendChild(delBtn);
        });
        calculateTotals();
    }

    function saveFullInvoice() {
        const invoice = {
            items,
            from: { name: document.getElementById('fromName')?.value, email: document.getElementById('fromEmail')?.value, phone: document.getElementById('fromPhone')?.value, address: document.getElementById('fromAddress')?.value, website: document.getElementById('fromWebsite')?.value, taxId: document.getElementById('fromTaxId')?.value },
            to: { name: document.getElementById('toName')?.value, email: document.getElementById('toEmail')?.value, phone: document.getElementById('toPhone')?.value, address: document.getElementById('toAddress')?.value, taxId: document.getElementById('toTaxId')?.value },
            settings: { invoiceNumber: document.getElementById('invNumber')?.value, issueDate: document.getElementById('issueDate')?.value, dueTerms: document.getElementById('dueTerms')?.value, currency: document.getElementById('currency')?.value, taxRate: document.getElementById('taxRate')?.value, notes: document.getElementById('notes')?.value }
        };
        localStorage.setItem('invoiceforge_app', JSON.stringify(invoice));
    }

    function loadSavedData() {
        const saved = localStorage.getItem('invoiceforge_app');
        if (!saved) return;
        const data = JSON.parse(saved);
        if (data.items) { items = data.items; renderItemsTable(); }
        if (data.from) {
            for (let k in data.from) { let el = document.getElementById(`from${k.charAt(0).toUpperCase()}${k.slice(1)}`); if (el) el.value = data.from[k]; }
        }
        if (data.to) {
            for (let k in data.to) { let el = document.getElementById(`to${k.charAt(0).toUpperCase()}${k.slice(1)}`); if (el) el.value = data.to[k]; }
        }
        if (data.settings) {
            for (let k in data.settings) { let el = document.getElementById(k); if (el) el.value = data.settings[k]; }
        }
    }

    // ---------- TEMPLATE SWITCHER ----------
    let currentTemplate = localStorage.getItem('invoiceTemplate') || 'Letter';
    function updateTemplateButtons() {
        document.querySelectorAll('.template-btn').forEach(btn => {
            if (btn.innerText === currentTemplate) {
                btn.classList.add('bg-blue-50', 'border-blue-500', 'text-blue-600');
            } else {
                btn.classList.remove('bg-blue-50', 'border-blue-500', 'text-blue-600');
            }
        });
        document.getElementById('templateBadge').innerText = currentTemplate;
    }

    document.getElementById('templateLetter').addEventListener('click', () => { currentTemplate = 'Letter'; localStorage.setItem('invoiceTemplate', currentTemplate); updateTemplateButtons(); updateLivePreview(); });
    document.getElementById('templateLedger').addEventListener('click', () => { currentTemplate = 'Ledger'; localStorage.setItem('invoiceTemplate', currentTemplate); updateTemplateButtons(); updateLivePreview(); });
    document.getElementById('templateInvoice').addEventListener('click', () => { currentTemplate = 'Invoice'; localStorage.setItem('invoiceTemplate', currentTemplate); updateTemplateButtons(); updateLivePreview(); });
    updateTemplateButtons();

    // ---------- LIVE PREVIEW ----------
    function updateLivePreview() {
        const from = { name: document.getElementById('fromName')?.value || 'Your Name', email: document.getElementById('fromEmail')?.value || 'your@email.com', phone: document.getElementById('fromPhone')?.value || '', address: document.getElementById('fromAddress')?.value || '' };
        const to = { name: document.getElementById('toName')?.value || 'Client Name', email: document.getElementById('toEmail')?.value || 'client@email.com', address: document.getElementById('toAddress')?.value || '' };
        const invNum = document.getElementById('invNumber')?.value || 'INV-001';
        const currency = getCurrencySymbol();
        const subtotal = items.reduce((sum, i) => sum + (i.qty || 0) * (i.rate || 0), 0);
        const taxRate = parseFloat(document.getElementById('taxRate')?.value) || 17;
        const taxAmount = subtotal * taxRate / 100;
        const total = subtotal + taxAmount;

        let html = `<div style="font-family: 'Inter', sans-serif; font-size: 13px; line-height: 1.5;">`;

        if (currentTemplate === 'Letter') {
            html += `<h2 style="font-weight: bold; font-size: 24px;">INVOICE ${invNum}</h2>`;
            html += `<div style="display: flex; justify-content: space-between; margin: 16px 0;"><div><strong>From</strong><br>${from.name}<br>${from.email}<br>${from.phone}<br>${from.address}</div><div><strong>To</strong><br>${to.name}<br>${to.email}<br>${to.address}</div></div>`;
            html += `<table style="width:100%; border-collapse: collapse;">`;
            items.forEach(i => {
                if (i.description || i.qty || i.rate) {
                    html += `<tr><td>${i.description || '-'}</td><td style="text-align:right">${i.qty || 0}</td><td style="text-align:right">${currency}${(i.rate || 0).toFixed(2)}</td><td style="text-align:right">${currency}${((i.qty||0)*(i.rate||0)).toFixed(2)}</td></tr>`;
                }
            });
            html += `</table><div style="text-align:right; margin-top:16px;">Subtotal: ${currency}${subtotal.toFixed(2)}<br>Tax (${taxRate}%): ${currency}${taxAmount.toFixed(2)}<br><strong>Total: ${currency}${total.toFixed(2)}</strong></div>`;
        } else if (currentTemplate === 'Ledger') {
            html += `<div style="border:1px solid #999; padding:20px;"><h2>Invoice ${invNum}</h2><hr/><div><strong>${from.name}</strong><br>${from.email}</div><hr/><div><strong>${to.name}</strong><br>${to.email}</div><hr/><table style="width:100%;">`;
            items.forEach(i => { if (i.description) html += `<tr><td>${i.description}</td><td style="text-align:right">${currency}${((i.qty||0)*(i.rate||0)).toFixed(2)}</td></tr>`; });
            html += `</table><div style="text-align:right;">Total: ${currency}${total.toFixed(2)}</div></div>`;
        } else { // Invoice template
            html += `<div style="border-left:6px solid #0066FF; padding-left:20px;"><h1>INVOICE</h1><p>${invNum}</p></div>`;
            html += `<div style="display:flex; justify-content:space-between; margin:20px 0;"><div><strong>Bill from</strong><br>${from.name}<br>${from.email}</div><div><strong>Bill to</strong><br>${to.name}<br>${to.email}</div></div>`;
            html += `<table style="width:100%;">`;
            items.forEach(i => { if (i.description) html += `<tr><td>${i.description}</td><td style="text-align:right">${currency}${((i.qty||0)*(i.rate||0)).toFixed(2)}</td></tr>`; });
            html += `</table><div style="text-align:right; margin-top:20px;"><div style="font-size:22px; font-weight:bold;">${currency}${total.toFixed(2)}</div></div>`;
        }
        html += `</div>`;
        document.getElementById('livePreviewContent').innerHTML = html;
    }

    // ---------- EVENT LISTENERS ----------
    document.getElementById('addItemBtn')?.addEventListener('click', () => {
        items.push({ id: Date.now(), description: '', qty: 1, rate: 0 });
        renderItemsTable();
        saveFullInvoice();
        updateLivePreview();
    });
    document.getElementById('currency')?.addEventListener('change', () => { renderItemsTable(); saveFullInvoice(); updateLivePreview(); });
    document.getElementById('taxRate')?.addEventListener('input', () => { calculateTotals(); saveFullInvoice(); updateLivePreview(); });
    const allInputs = ['#fromName', '#fromEmail', '#fromPhone', '#fromAddress', '#fromWebsite', '#fromTaxId', '#toName', '#toEmail', '#toPhone', '#toAddress', '#toTaxId', '#invNumber', '#issueDate', '#dueTerms', '#currency', '#taxRate', '#notes'];
    allInputs.forEach(sel => { const el = document.querySelector(sel); if (el) el.addEventListener('input', () => { saveFullInvoice(); updateLivePreview(); }); });
    document.getElementById('downloadPdfBtn')?.addEventListener('click', () => {
        const w = window.open('', '_blank');
        w.document.write(`<html><head><title>Invoice</title><style>body{font-family:'Inter',sans-serif;padding:2rem;}</style></head><body>${document.getElementById('livePreviewContent').innerHTML}</body></html>`);
        w.document.close(); w.print();
    });
    document.getElementById('exportForgeBtn')?.addEventListener('click', () => {
        const inv = { items, from: { name: document.getElementById('fromName')?.value }, to: { name: document.getElementById('toName')?.value }, settings: { invoiceNumber: document.getElementById('invNumber')?.value } };
        const data = JSON.stringify(inv, null, 2);
        const blob = new Blob([data], {type:'application/json'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `${document.getElementById('invNumber')?.value||'invoice'}.forge`;
        a.click();
        URL.revokeObjectURL(url);
    });

    // Initialize
    loadSavedData();
    if (!items.length) { items = [{ id: Date.now(), description: '', qty: 1, rate: 0 }]; renderItemsTable(); }
    if (!document.getElementById('issueDate').value) document.getElementById('issueDate').value = new Date().toISOString().slice(0,10);
    calculateTotals();
    updateLivePreview();
</script>
</body>
</html>
