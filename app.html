<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>InvoiceForge – Professional Invoice Builder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #F9FAFB; -webkit-font-smoothing: antialiased; }
        .tab-active { border-bottom: 2px solid #0066FF; color: #0066FF; }
        #livePreviewContent {
            background: white;
            border-radius: 12px;
            padding: 24px;
            min-height: 800px;
            transition: all 0.2s;
            position: relative;
            overflow-x: auto;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .invoice-table {
            width: 100%;
            border-collapse: collapse;
        }
        .invoice-table th, .invoice-table td {
            padding: 8px;
            vertical-align: top;
        }
        .invoice-table th:first-child, .invoice-table td:first-child { text-align: left; }
        .invoice-table th:nth-child(2), .invoice-table td:nth-child(2),
        .invoice-table th:nth-child(3), .invoice-table td:nth-child(3),
        .invoice-table th:nth-child(4), .invoice-table td:nth-child(4),
        .invoice-table th:nth-child(5), .invoice-table td:nth-child(5) {
            text-align: right;
            font-variant-numeric: tabular-nums;
        }
        .remove-item {
            opacity: 0;
            transition: opacity 0.2s;
            cursor: pointer;
        }
        tr:hover .remove-item { opacity: 1; }
        .builder-grid {
            display: grid;
            grid-template-columns: 440px 1fr;
            gap: 32px;
            max-width: 1400px;
            margin: 0 auto;
        }
        @media (max-width: 900px) {
            .builder-grid { grid-template-columns: 1fr; gap: 20px; }
        }
        .logo-placeholder {
            width: 40px;
            height: 40px;
            background: #0066FF;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            font-weight: bold;
            font-size: 18px;
        }
        .footer-signature {
            margin-top: 32px;
            padding-top: 16px;
            border-top: 1px solid #E5E7EB;
            font-size: 12px;
            color: #6B7280;
            text-align: center;
        }
    </style>
</head>
<body class="bg-gray-50">

<!-- Header -->
<div class="bg-white border-b border-gray-200 sticky top-0 z-10">
    <div class="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center">
        <a href="index.html" class="font-bold text-xl text-[#0066FF]">InvoiceForge</a>
        <div class="flex gap-4 text-sm">
            <a href="#" class="text-gray-600">Templates</a>
            <a href="#" class="text-gray-600">Guide</a>
            <a href="#" class="text-gray-600">GitHub</a>
        </div>
    </div>
</div>

<main class="max-w-7xl mx-auto px-4 py-8">
    <div class="builder-grid">
        <!-- LEFT: FORM PANEL -->
        <div class="space-y-6">
            <div class="bg-white rounded-xl border border-gray-200 shadow-sm p-6">
                <div class="flex border-b border-gray-200 mb-6 flex-wrap">
                    <button class="tab-btn px-4 py-2 text-sm font-medium tab-active" data-tab="from">From</button>
                    <button class="tab-btn px-4 py-2 text-sm font-medium text-gray-500" data-tab="to">To</button>
                    <button class="tab-btn px-4 py-2 text-sm font-medium text-gray-500" data-tab="items">Items</button>
                    <button class="tab-btn px-4 py-2 text-sm font-medium text-gray-500" data-tab="settings">Settings</button>
                </div>

                <!-- From Tab (with NTN + Phone) -->
                <div id="tab-from" class="tab-pane space-y-4">
                    <div><label class="block text-sm font-medium text-gray-700">Your Name</label><input type="text" id="fromName" placeholder="e.g., Ali Raza" class="mt-1 w-full border border-gray-300 rounded-lg px-3 py-2 text-sm"></div>
                    <div><label class="block text-sm font-medium text-gray-700">NTN / STRN</label><input type="text" id="fromTaxId" placeholder="e.g., 1234567-8" class="mt-1 w-full border border-gray-300 rounded-lg px-3 py-2 text-sm"></div>
                    <div><label class="block text-sm font-medium text-gray-700">Phone</label><input type="text" id="fromPhone" placeholder="+92 300 1234567" class="mt-1 w-full border border-gray-300 rounded-lg px-3 py-2 text-sm"></div>
                    <div><label class="block text-sm font-medium text-gray-700">Email</label><input type="email" id="fromEmail" placeholder="ali@studio.com" class="mt-1 w-full border border-gray-300 rounded-lg px-3 py-2 text-sm"></div>
                    <div><label class="block text-sm font-medium text-gray-700">Address</label><textarea id="fromAddress" rows="2" placeholder="Street, City, Country" class="mt-1 w-full border border-gray-300 rounded-lg px-3 py-2 text-sm"></textarea></div>
                    <div><label class="block text-sm font-medium text-gray-700">Website</label><input type="text" id="fromWebsite" placeholder="https://yourwebsite.com" class="mt-1 w-full border border-gray-300 rounded-lg px-3 py-2 text-sm"></div>
                </div>

                <!-- To Tab -->
                <div id="tab-to" class="tab-pane hidden space-y-4">
                    <div><label class="block text-sm font-medium text-gray-700">Client Name</label><input type="text" id="toName" placeholder="e.g., Acme Corp" class="mt-1 w-full border border-gray-300 rounded-lg px-3 py-2 text-sm"></div>
                    <div><label class="block text-sm font-medium text-gray-700">Client Email</label><input type="email" id="toEmail" placeholder="billing@acme.com" class="mt-1 w-full border border-gray-300 rounded-lg px-3 py-2 text-sm"></div>
                    <div><label class="block text-sm font-medium text-gray-700">Client Phone</label><input type="text" id="toPhone" placeholder="+92 321 7654321" class="mt-1 w-full border border-gray-300 rounded-lg px-3 py-2 text-sm"></div>
                    <div><label class="block text-sm font-medium text-gray-700">Client Address</label><textarea id="toAddress" rows="2" placeholder="Client office address" class="mt-1 w-full border border-gray-300 rounded-lg px-3 py-2 text-sm"></textarea></div>
                    <div><label class="block text-sm font-medium text-gray-700">Client PO Number</label><input type="text" id="poNumber" placeholder="e.g., ACME-DEV-2026-05" class="mt-1 w-full border border-gray-300 rounded-lg px-3 py-2 text-sm"></div>
                </div>

                <!-- Items Tab (with Unit column) -->
                <div id="tab-items" class="tab-pane hidden">
                    <div class="overflow-x-auto">
                        <table class="w-full text-sm">
                            <thead class="border-b border-gray-200">
                                <tr class="text-left text-gray-500">
                                    <th class="pb-2">Item / Description</th>
                                    <th class="pb-2 w-16 text-right">Qty</th>
                                    <th class="pb-2 w-20 text-center">Unit</th>
                                    <th class="pb-2 w-24 text-right">Rate</th>
                                    <th class="pb-2 w-24 text-right">Amount</th>
                                    <th class="pb-2 w-8"></th>
                                  </tr>
                            </thead>
                            <tbody id="items-tbody"></tbody>
                          </table>
                    </div>
                    <button id="addItemBtn" class="mt-3 text-sm text-[#0066FF] hover:text-[#0052CC] flex items-center gap-1">+ Add line item</button>
                    <div class="mt-6 border-t pt-4 space-y-2 text-right">
                        <div class="flex justify-between gap-8"><span>Subtotal</span><span id="subtotal" class="font-mono">₨0.00</span></div>
                        <div class="flex justify-between gap-8"><span>GST/VAT (<span id="taxRateDisplay">17</span>%)</span><span id="taxAmount" class="font-mono">₨0.00</span></div>
                        <div class="flex justify-between gap-8 font-semibold"><span>Total</span><span id="grandTotal" class="font-mono text-[#0066FF]">₨0.00</span></div>
                    </div>
                </div>

                <!-- Settings Tab -->
                <div id="tab-settings" class="tab-pane hidden space-y-4">
                    <div><label class="block text-sm font-medium text-gray-700">Invoice Number</label><input type="text" id="invNumber" value="INV-001" class="mt-1 w-full border border-gray-300 rounded-lg px-3 py-2 text-sm"></div>
                    <div><label class="block text-sm font-medium text-gray-700">Invoice Date</label><input type="date" id="issueDate" class="mt-1 w-full border border-gray-300 rounded-lg px-3 py-2 text-sm"></div>
                    <div><label class="block text-sm font-medium text-gray-700">Due Terms (Net days)</label><select id="dueTerms" class="mt-1 w-full border border-gray-300 rounded-lg px-3 py-2 text-sm"><option>Net 7</option><option selected>Net 14</option><option>Net 30</option><option>Due on receipt</option></select></div>
                    <div><label class="block text-sm font-medium text-gray-700">Currency</label><select id="currency" class="mt-1 w-full border border-gray-300 rounded-lg px-3 py-2 text-sm"><option value="PKR">PKR (₨)</option><option value="USD">USD ($)</option><option value="EUR">EUR (€)</option></select></div>
                    <div><label class="block text-sm font-medium text-gray-700">GST / VAT (%)</label><input type="number" id="taxRate" value="17" step="0.1" class="mt-1 w-full border border-gray-300 rounded-lg px-3 py-2 text-sm"><p class="text-xs text-gray-500 mt-1">Pakistan: 17% GST. UAE: 5% VAT. Set 0 if exempt.</p></div>
                    <div><label class="block text-sm font-medium text-gray-700">Discount (%)</label><input type="number" id="discount" value="0" class="mt-1 w-full border border-gray-300 rounded-lg px-3 py-2 text-sm"></div>
                    <div><label class="block text-sm font-medium text-gray-700">Payment Information<br><span class="text-xs text-gray-500">Bank, IBAN, JazzCash, Easypaisa, etc.</span></label><textarea id="paymentInfo" rows="4" class="mt-1 w-full border border-gray-300 rounded-lg px-3 py-2 text-sm"></textarea></div>
                    <div><label class="block text-sm font-medium text-gray-700">Mark as Paid</label><div class="flex items-center gap-2 mt-1"><input type="checkbox" id="isPaidCheckbox" class="w-4 h-4 text-[#0066FF]"><label class="text-sm text-gray-600">(Shows PAID date & method)</label></div></div>
                    <div id="paidDetails" style="display: none;" class="ml-6 space-y-2">
                        <div><label class="block text-sm font-medium text-gray-700">Paid Date</label><input type="date" id="paidDate" class="mt-1 w-full border border-gray-300 rounded-lg px-3 py-2 text-sm"></div>
                        <div><label class="block text-sm font-medium text-gray-700">Payment Method</label><select id="paidMethod" class="mt-1 w-full border border-gray-300 rounded-lg px-3 py-2 text-sm"><option>Bank Transfer</option><option>PayPal</option><option>Wise</option><option>Credit Card</option><option>Cryptocurrency</option><option>Other</option></select></div>
                    </div>
                    <div><label class="block text-sm font-medium text-gray-700">Notes / Terms</label><textarea id="notes" rows="2" class="mt-1 w-full border border-gray-300 rounded-lg px-3 py-2 text-sm">Net 14 days. Late fee 2% monthly. Code/assets upon full payment.</textarea></div>
                </div>
            </div>
        </div>

        <!-- RIGHT: PREVIEW -->
        <div class="sticky top-24">
            <div id="livePreviewContent" class="bg-white border border-gray-200 rounded-xl p-6 shadow-sm min-h-[800px] overflow-x-auto">
                <p class="text-gray-500 text-center text-sm">Loading preview...</p>
            </div>
            <button id="downloadPdfBtn" class="w-full mt-4 bg-[#0066FF] text-white py-3 rounded-lg font-medium hover:bg-[#0052CC] transition">Generate PDF Invoice</button>
        </div>
    </div>
</main>

<script>
    // ---------- TAB SWITCHING ----------
    const tabs = document.querySelectorAll('.tab-btn');
    const panes = document.querySelectorAll('.tab-pane');
    tabs.forEach(btn => {
        btn.addEventListener('click', () => {
            const tabId = btn.getAttribute('data-tab');
            tabs.forEach(b => { b.classList.remove('tab-active'); b.classList.add('text-gray-500'); });
            btn.classList.add('tab-active'); btn.classList.remove('text-gray-500');
            panes.forEach(pane => pane.classList.add('hidden'));
            document.getElementById(`tab-${tabId}`).classList.remove('hidden');
        });
    });

    // ---------- AUTO-INCREMENT INVOICE NUMBER ----------
    let lastInvoiceNumber = localStorage.getItem('lastInvoiceNumber') || 0;
    function getNextInvoiceNumber() {
        lastInvoiceNumber++;
        localStorage.setItem('lastInvoiceNumber', lastInvoiceNumber);
        return `INV-${String(lastInvoiceNumber).padStart(3, '0')}`;
    }
    function setInvoiceNumberInput() {
        const invInput = document.getElementById('invNumber');
        if (!invInput.value || invInput.value === 'INV-001') {
            const next = getNextInvoiceNumber();
            invInput.value = next;
        }
    }

    // ---------- ITEMS ----------
    let items = [];

    function getCurrencySymbol() {
        const map = { PKR: '₨', USD: '$', EUR: '€' };
        return map[document.getElementById('currency')?.value] || '₨';
    }

    function calculateTotals() {
        const subtotal = items.reduce((sum, i) => sum + (i.qty || 0) * (i.rate || 0), 0);
        const taxRate = parseFloat(document.getElementById('taxRate')?.value) || 0;
        const discount = parseFloat(document.getElementById('discount')?.value) || 0;
        const afterDiscount = subtotal - (subtotal * discount / 100);
        const taxAmount = afterDiscount * taxRate / 100;
        const total = afterDiscount + taxAmount;
        document.getElementById('subtotal').innerText = `${getCurrencySymbol()}${subtotal.toFixed(2)}`;
        document.getElementById('taxAmount').innerText = `${getCurrencySymbol()}${taxAmount.toFixed(2)}`;
        document.getElementById('grandTotal').innerText = `${getCurrencySymbol()}${total.toFixed(2)}`;
        document.getElementById('taxRateDisplay').innerText = taxRate;
    }

    function renderItemsTable() {
        const tbody = document.getElementById('items-tbody');
        if (!tbody) return;
        tbody.innerHTML = '';
        if (items.length === 0) {
            items = [
                { id: Date.now(), description: 'API Integration: Stripe Webhooks + Error Handling', qty: 1, unit: 'project', rate: 100 },
                { id: Date.now()+1, description: 'Code Review & Refactor: Auth Module', qty: 2, unit: 'hours', rate: 75 }
            ];
        }
        items.forEach((item, idx) => {
            const row = tbody.insertRow();
            row.className = 'border-b border-gray-100';
            const descCell = row.insertCell(0); descCell.className = 'py-2';
            const descInput = document.createElement('input');
            descInput.type = 'text'; descInput.value = item.description || '';
            descInput.placeholder = 'Describe the work';
            descInput.className = 'w-full bg-transparent border-none p-0 text-sm';
            descInput.addEventListener('input', (e) => { items[idx].description = e.target.value; saveFullInvoice(); calculateTotals(); updateLivePreview(); });
            descCell.appendChild(descInput);
            const qtyCell = row.insertCell(1); qtyCell.className = 'text-right py-2';
            const qtyInput = document.createElement('input');
            qtyInput.type = 'number'; qtyInput.value = item.qty; qtyInput.className = 'w-16 text-right border rounded px-1 py-0.5 text-sm';
            qtyInput.step = '0.01'; qtyInput.min = '0';
            qtyInput.addEventListener('input', (e) => { items[idx].qty = parseFloat(e.target.value) || 0; saveFullInvoice(); calculateTotals(); updateLivePreview(); });
            qtyCell.appendChild(qtyInput);
            const unitCell = row.insertCell(2); unitCell.className = 'text-center py-2';
            const unitInput = document.createElement('input');
            unitInput.type = 'text'; unitInput.value = item.unit || '';
            unitInput.placeholder = 'hrs/days/proj';
            unitInput.className = 'w-20 text-center border rounded px-1 py-0.5 text-sm';
            unitInput.addEventListener('input', (e) => { items[idx].unit = e.target.value; saveFullInvoice(); updateLivePreview(); });
            unitCell.appendChild(unitInput);
            const rateCell = row.insertCell(3); rateCell.className = 'text-right py-2';
            const rateInput = document.createElement('input');
            rateInput.type = 'number'; rateInput.value = item.rate; rateInput.className = 'w-24 text-right border rounded px-1 py-0.5 text-sm';
            rateInput.step = '0.01'; rateInput.min = '0';
            rateInput.addEventListener('input', (e) => { items[idx].rate = parseFloat(e.target.value) || 0; saveFullInvoice(); calculateTotals(); updateLivePreview(); });
            const symbol = getCurrencySymbol();
            rateCell.innerHTML = `<span class="mr-1">${symbol}</span>`; rateCell.appendChild(rateInput);
            const amountCell = row.insertCell(4); amountCell.className = 'text-right font-mono py-2';
            amountCell.innerText = `${symbol}${((item.qty||0)*(item.rate||0)).toFixed(2)}`;
            const delCell = row.insertCell(5); delCell.className = 'text-center py-2';
            const delBtn = document.createElement('button');
            delBtn.innerHTML = '✕';
            delBtn.className = 'remove-item text-red-500 hover:text-red-700 text-xs';
            delBtn.addEventListener('click', () => {
                if (items.length === 1) return;
                items.splice(idx, 1);
                renderItemsTable();
                saveFullInvoice();
                calculateTotals();
                updateLivePreview();
            });
            delCell.appendChild(delBtn);
        });
        calculateTotals();
    }

    function updatePaymentInfoPlaceholder() {
        const currency = document.getElementById('currency').value;
        const textarea = document.getElementById('paymentInfo');
        if (!textarea) return;
        let defaultText = '';
        if (currency === 'PKR') {
            defaultText = `Bank: HBL\nAccount Title: Ali Raza\nIBAN: PK36HABB0000001234567890\nJazzCash: 0300-1234567\nEasypaisa: 0300-1234567`;
        } else if (currency === 'USD') {
            defaultText = `Bank: Chase\nRouting: 021000021\nAccount: 123456789\nPayPal: you@email.com\nWise: you@wise.com`;
        } else if (currency === 'EUR') {
            defaultText = `Bank: Deutsche Bank\nIBAN: DE89 3704 0044 0532 0130 00\nBIC: DEUTDEDB\nPayPal: you@email.com`;
        }
        textarea.placeholder = defaultText;
        if (!textarea.value) textarea.value = defaultText;
    }

    function saveFullInvoice() {
        const invoice = {
            items,
            from: {
                name: document.getElementById('fromName')?.value || 'Ali Raza',
                taxId: document.getElementById('fromTaxId')?.value || '',
                phone: document.getElementById('fromPhone')?.value || '',
                email: document.getElementById('fromEmail')?.value || 'ali@studio.com',
                address: document.getElementById('fromAddress')?.value || '',
                website: document.getElementById('fromWebsite')?.value || ''
            },
            to: {
                name: document.getElementById('toName')?.value || 'Acme Corp',
                email: document.getElementById('toEmail')?.value || 'billing@acme.com',
                phone: document.getElementById('toPhone')?.value || '',
                address: document.getElementById('toAddress')?.value || '',
                poNumber: document.getElementById('poNumber')?.value || ''
            },
            settings: {
                invoiceNumber: document.getElementById('invNumber')?.value || 'INV-001',
                issueDate: document.getElementById('issueDate')?.value,
                dueTerms: document.getElementById('dueTerms')?.value,
                currency: document.getElementById('currency')?.value,
                taxRate: document.getElementById('taxRate')?.value,
                discount: document.getElementById('discount')?.value,
                paymentInfo: document.getElementById('paymentInfo')?.value,
                isPaid: document.getElementById('isPaidCheckbox')?.checked,
                paidDate: document.getElementById('paidDate')?.value,
                paidMethod: document.getElementById('paidMethod')?.value,
                notes: document.getElementById('notes')?.value
            }
        };
        localStorage.setItem('invoiceforge_app', JSON.stringify(invoice));
    }

    function loadSavedData() {
        const saved = localStorage.getItem('invoiceforge_app');
        if (!saved) return;
        const data = JSON.parse(saved);
        if (data.items && data.items.length) items = data.items;
        if (data.from) {
            document.getElementById('fromName').value = data.from.name || '';
            document.getElementById('fromTaxId').value = data.from.taxId || '';
            document.getElementById('fromPhone').value = data.from.phone || '';
            document.getElementById('fromEmail').value = data.from.email || '';
            document.getElementById('fromAddress').value = data.from.address || '';
            document.getElementById('fromWebsite').value = data.from.website || '';
        }
        if (data.to) {
            document.getElementById('toName').value = data.to.name || '';
            document.getElementById('toEmail').value = data.to.email || '';
            document.getElementById('toPhone').value = data.to.phone || '';
            document.getElementById('toAddress').value = data.to.address || '';
            document.getElementById('poNumber').value = data.to.poNumber || '';
        }
        if (data.settings) {
            for (let k in data.settings) {
                let el = document.getElementById(k);
                if (el && !['isPaid','paidDate','paidMethod'].includes(k)) el.value = data.settings[k];
            }
            if (document.getElementById('isPaidCheckbox')) document.getElementById('isPaidCheckbox').checked = data.settings.isPaid || false;
            if (document.getElementById('paidDate')) document.getElementById('paidDate').value = data.settings.paidDate || '';
            if (document.getElementById('paidMethod')) document.getElementById('paidMethod').value = data.settings.paidMethod || 'Bank Transfer';
            document.getElementById('paidDetails').style.display = data.settings.isPaid ? 'block' : 'none';
        }
        renderItemsTable();
        updatePaymentInfoPlaceholder();
    }

    // ---------- LIVE PREVIEW ----------
    function updateLivePreview() {
        const from = {
            name: document.getElementById('fromName')?.value || 'Ali Raza',
            taxId: document.getElementById('fromTaxId')?.value || '',
            phone: document.getElementById('fromPhone')?.value || '',
            email: document.getElementById('fromEmail')?.value || 'ali@studio.com',
            address: document.getElementById('fromAddress')?.value || '',
            website: document.getElementById('fromWebsite')?.value || ''
        };
        const to = {
            name: document.getElementById('toName')?.value || 'Acme Corp',
            email: document.getElementById('toEmail')?.value || 'billing@acme.com',
            phone: document.getElementById('toPhone')?.value || '',
            address: document.getElementById('toAddress')?.value || '',
            poNumber: document.getElementById('poNumber')?.value || ''
        };
        const invNum = document.getElementById('invNumber')?.value || 'INV-001';
        const currencySymbol = getCurrencySymbol();
        const subtotal = items.reduce((sum, i) => sum + (i.qty || 0) * (i.rate || 0), 0);
        const discountPercent = parseFloat(document.getElementById('discount')?.value) || 0;
        const discountAmount = subtotal * discountPercent / 100;
        const afterDiscount = subtotal - discountAmount;
        const taxRate = parseFloat(document.getElementById('taxRate')?.value) || 0;
        const taxAmount = afterDiscount * taxRate / 100;
        const total = afterDiscount + taxAmount;

        const issueDateRaw = document.getElementById('issueDate')?.value;
        let invoiceDate = '', dueDate = '';
        if (issueDateRaw) {
            const dateObj = new Date(issueDateRaw);
            invoiceDate = dateObj.toLocaleDateString('en-PK', { year: 'numeric', month: 'long', day: 'numeric' });
            const days = parseInt(document.getElementById('dueTerms')?.value) || 14;
            const dueObj = new Date(dateObj);
            dueObj.setDate(dateObj.getDate() + days);
            dueDate = dueObj.toLocaleDateString('en-PK', { year: 'numeric', month: 'long', day: 'numeric' });
        } else {
            invoiceDate = 'Not set';
        }

        const isPaid = document.getElementById('isPaidCheckbox')?.checked || false;
        const paidDate = document.getElementById('paidDate')?.value;
        const paidMethod = document.getElementById('paidMethod')?.value;
        const notes = document.getElementById('notes')?.value || 'Net 14 days. Late fee 2% monthly.';
        const paymentInfo = document.getElementById('paymentInfo')?.value || '';

        let inner = `
            <div style="font-family: 'Inter', sans-serif;">
                <div style="display: flex; justify-content: space-between; margin-bottom: 24px;">
                    <div class="logo-placeholder">AR</div>
                    <div style="text-align: right;">
                        <h1 style="font-size: 32px; margin: 0;">INVOICE</h1>
                        <p style="color: #6B7280;"># ${invNum}</p>
                        <p style="font-size: 12px; margin-top: 4px;">Issue: ${invoiceDate}<br>Due: ${dueDate || '—'}</p>
                    </div>
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px;">
                    <div>
                        <strong>From</strong><br>${from.name}<br>
                        ${from.taxId ? `NTN: ${from.taxId}<br>` : ''}
                        Phone: ${from.phone}<br>
                        ${from.email}<br>
                        ${from.address}
                    </div>
                    <div>
                        <strong>To</strong><br>${to.name}<br>${to.email}<br>${to.phone}<br>${to.address}<br>
                        ${to.poNumber ? `PO: ${to.poNumber}` : ''}
                    </div>
                </div>
                <table class="invoice-table" style="width: 100%; border-collapse: collapse; margin-bottom: 24px;">
                    <thead><tr style="border-bottom: 2px solid #E5E7EB;">
                        <th style="text-align: left; padding: 8px;">Item</th>
                        <th style="text-align: right; padding: 8px;">Qty</th>
                        <th style="text-align: center; padding: 8px;">Unit</th>
                        <th style="text-align: right; padding: 8px;">Rate</th>
                        <th style="text-align: right; padding: 8px;">Amount</th>
                      </tr></thead>
                    <tbody>`;
        items.forEach(i => {
            if (i.description || i.qty || i.rate) {
                inner += `<tr style="border-bottom: 1px solid #E5E7EB;">
                            <td style="padding: 8px;">${i.description || '-'}</td>
                            <td style="text-align: right; padding: 8px;">${i.qty || 0}</td>
                            <td style="text-align: center; padding: 8px;">${i.unit || ''}</td>
                            <td style="text-align: right; padding: 8px;">${currencySymbol}${(i.rate || 0).toFixed(2)}</td>
                            <td style="text-align: right; padding: 8px;">${currencySymbol}${((i.qty||0)*(i.rate||0)).toFixed(2)}</td>
                          </tr>`;
            }
        });
        inner += `
                    </tbody>
                </table>
                <div style="text-align: right; margin-top: 20px; border-top: 1px solid #E5E7EB; padding-top: 16px;">
                    <div>Subtotal: ${currencySymbol}${subtotal.toFixed(2)}</div>
                    ${discountPercent > 0 ? `<div>Discount (${discountPercent}%): -${currencySymbol}${discountAmount.toFixed(2)}</div>` : ''}
                    <div>GST/VAT (${taxRate}%): ${currencySymbol}${taxAmount.toFixed(2)}</div>
                    <div style="font-size: 24px; font-weight: bold; margin-top: 8px;">Total: ${currencySymbol}${total.toFixed(2)}</div>
                </div>
                ${paymentInfo ? `<div class="text-sm mt-4 p-3 bg-gray-50 rounded"><strong>Payment Information</strong><br>${paymentInfo.replace(/\n/g, '<br>')}</div>` : ''}
                <div class="text-sm mt-4 p-3 bg-gray-50 rounded"><strong>Terms & Notes</strong><br>${notes.replace(/\n/g, '<br>')}</div>
                ${isPaid && paidDate ? `<div class="text-sm mt-2 font-semibold text-green-600">PAID on ${paidDate} via ${paidMethod}</div>` : ''}
                <div class="footer-signature">
                    ${from.name} | Full‑Stack Developer | ${from.website || 'website'} | ${from.email}
                </div>
            </div>`;
        document.getElementById('livePreviewContent').innerHTML = inner;
    }

    // ---------- EVENT LISTENERS ----------
    document.getElementById('addItemBtn')?.addEventListener('click', () => {
        items.push({ id: Date.now(), description: '', qty: 1, unit: '', rate: 0 });
        renderItemsTable();
        saveFullInvoice();
        updateLivePreview();
    });
    document.getElementById('currency')?.addEventListener('change', () => {
        updatePaymentInfoPlaceholder();
        renderItemsTable();
        saveFullInvoice();
        updateLivePreview();
    });
    document.getElementById('taxRate')?.addEventListener('input', () => { calculateTotals(); saveFullInvoice(); updateLivePreview(); });
    document.getElementById('discount')?.addEventListener('input', () => { calculateTotals(); saveFullInvoice(); updateLivePreview(); });
    document.getElementById('isPaidCheckbox')?.addEventListener('change', (e) => {
        const detailsDiv = document.getElementById('paidDetails');
        detailsDiv.style.display = e.target.checked ? 'block' : 'none';
        if (e.target.checked && !document.getElementById('paidDate').value) {
            document.getElementById('paidDate').value = new Date().toISOString().slice(0,10);
        }
        saveFullInvoice();
        updateLivePreview();
    });
    document.getElementById('paidDate')?.addEventListener('change', () => { saveFullInvoice(); updateLivePreview(); });
    document.getElementById('paidMethod')?.addEventListener('change', () => { saveFullInvoice(); updateLivePreview(); });
    document.getElementById('dueTerms')?.addEventListener('change', () => { saveFullInvoice(); updateLivePreview(); });
    const allInputs = [
        '#fromName', '#fromTaxId', '#fromPhone', '#fromEmail', '#fromAddress', '#fromWebsite',
        '#toName', '#toEmail', '#toPhone', '#toAddress', '#poNumber',
        '#invNumber', '#issueDate', '#dueTerms', '#currency', '#taxRate', '#discount', '#paymentInfo', '#notes'
    ];
    allInputs.forEach(sel => { const el = document.querySelector(sel); if (el) el.addEventListener('input', () => { saveFullInvoice(); updateLivePreview(); }); });
    document.getElementById('downloadPdfBtn')?.addEventListener('click', () => {
        setInvoiceNumberInput();
        const invNum = document.getElementById('invNumber').value;
        const w = window.open('', '_blank');
        w.document.write(`<html><head><title>Invoice ${invNum}</title><style>body{font-family:'Inter',sans-serif;padding:2rem;background:white;}</style></head><body>${document.getElementById('livePreviewContent').innerHTML}</body></html>`);
        w.document.close(); w.print();
        alert(`✅ Invoice ${invNum} saved as PDF`);
        saveFullInvoice();
    });

    // ---------- INIT (forces PKR + payment info) ----------
    function init() {
        // Force PKR and default payment info
        document.getElementById('currency').value = 'PKR';
        updatePaymentInfoPlaceholder();  // this sets both placeholder and actual value
        // Load saved (or fallback to sample items)
        loadSavedData();
        if (!items.length) {
            items = [
                { id: Date.now(), description: 'API Integration: Stripe Webhooks + Error Handling', qty: 1, unit: 'project', rate: 100 },
                { id: Date.now()+1, description: 'Code Review & Refactor: Auth Module', qty: 2, unit: 'hours', rate: 75 }
            ];
            renderItemsTable();
        }
        if (!document.getElementById('issueDate').value) document.getElementById('issueDate').value = new Date().toISOString().slice(0,10);
        setInvoiceNumberInput();
        calculateTotals();
        updateLivePreview();
        if (document.getElementById('isPaidCheckbox').checked) document.getElementById('paidDetails').style.display = 'block';
        else document.getElementById('paidDetails').style.display = 'none';
        setTimeout(() => { updateLivePreview(); }, 500);
    }
    init();
</script>
</body>
</html>
