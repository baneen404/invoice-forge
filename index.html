<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InvoiceForge – Free Invoice Generator</title>
    <link rel="stylesheet" href="style.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0A0A0B;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            color: #FAFAFA;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        .header {
            background: #111115;
            padding: 1rem 2rem;
            border-bottom: 1px solid #2a2a2e;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo { font-size: 1.5rem; font-weight: 700; }
        .logo span { color: #F97316; }
        .main {
            display: flex;
            flex: 1;
            overflow: hidden;
        }
        .sidebar {
            width: 360px;
            background: #111115;
            border-right: 1px solid #2a2a2e;
            overflow-y: auto;
            padding: 1.5rem;
        }
        .preview-area {
            flex: 1;
            background: #0A0A0B;
            overflow-y: auto;
            padding: 2rem;
            display: flex;
            justify-content: center;
        }
        .invoice-preview {
            width: 210mm;
            background: white;
            color: black;
            border-radius: 8px;
            padding: 2rem;
            min-height: 297mm;
            box-shadow: 0 20px 35px rgba(0,0,0,0.3);
        }
        .placeholder {
            color: #888;
            text-align: center;
            padding: 2rem;
        }
        @media (max-width: 700px) {
            .main { flex-direction: column; }
            .sidebar { width: 100%; max-height: 50vh; }
        }
    </style>
</head>
<body>
<div class="header">
    <div class="logo">forge<span>.invoice</span></div>
    <button style="background: #F97316; border: none; padding: 0.4rem 1rem; border-radius: 30px; font-weight: 600;">Download PDF</button>
</div>
<div class="main">
    <div class="sidebar">
        <h2 style="margin-bottom: 1rem;">Invoice Details</h2>
        <p class="placeholder">Form fields will go here (From, To, Items, Settings)</p>
    </div>
    <div class="preview-area">
        <div class="invoice-preview">
            <p class="placeholder">Live invoice preview will appear here</p>
        </div>
    </div>
</div>
<script src="script.js"></script>
</body>
</html>
